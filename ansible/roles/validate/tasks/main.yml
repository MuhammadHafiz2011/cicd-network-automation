---

# =================================
# VALIDATE CONFIGURATION
# =================================

# -------------------------------------------------
# VALIDATE INTERFACE CONFIGURATION
# Memastikan IP interface valid dan menggunakan CIDR
# -------------------------------------------------

- name: Validate interface IP address
  assert:
    that:
      - item.ip_address | ansible.utils.ipaddr
      - item.ip_address is search('/')
    fail_msg: "Invalid interface IP: {{ item.ip_address }}"
    success_msg: "Interface IP valid: {{ item.ip_address }}"
  loop: "{{ mikrotik_interfaces }}"
  loop_control:
    label: "{{ item.interface }}"
  when: item.ip_address is defined

# -------------------------------------------------
# VALIDATE DHCP NETWORK CONFIGURATION
# Memastikan network DHCP valid
# -------------------------------------------------

- name: Validate DHCP network
  assert:
    that:
      - item.dhcp_network | ansible.utils.ipaddr
      - item.dhcp_network is search('/')
    fail_msg: "Invalid DHCP network: {{ item.dhcp_network }}"
    success_msg: "DHCP network valid: {{ item.dhcp_network }}"
  loop: "{{ mikrotik_dhcp }}"
  loop_control:
    label: "{{ item.dhcp_name }}"

# -------------------------------------------------
# VALIDATE DHCP GATEWAY
# Memastikan gateway menggunakan format IP valid
# -------------------------------------------------

- name: Validate DHCP gateway
  assert:
    that:
      - item.dhcp_gateway | ansible.utils.ipaddr
    fail_msg: "Invalid DHCP gateway: {{ item.dhcp_gateway }}"
    success_msg: "DHCP gateway valid: {{ item.dhcp_gateway }}"
  loop: "{{ mikrotik_dhcp }}"
  loop_control:
    label: "{{ item.dhcp_name }}"

# -------------------------------------------------
# VALIDATE DHCP DNS SERVER
# Memastikan DNS server DHCP valid
# -------------------------------------------------

- name: Validate DHCP DNS server
  assert:
    that:
      - item.dns_server | ansible.utils.ipaddr
    fail_msg: "Invalid DHCP DNS server: {{ item.dns_server }}"
    success_msg: "DHCP DNS server valid: {{ item.dns_server }}"
  loop: "{{ mikrotik_dhcp }}"
  loop_control:
    label: "{{ item.dhcp_name }}"

# -------------------------------------------------
# VALIDATE DHCP RANGE FORMAT
# Memastikan range memiliki format start-end IP
# -------------------------------------------------

- name: Validate DHCP range
  assert:
    that:
      - item.dhcp_range.split('-') | length == 2
      - item.dhcp_range.split('-')[0] | ansible.utils.ipaddr
      - item.dhcp_range.split('-')[1] | ansible.utils.ipaddr
    fail_msg: "Invalid DHCP range: {{ item.dhcp_range }}"
    success_msg: "DHCP range valid: {{ item.dhcp_range }}"
  loop: "{{ mikrotik_dhcp }}"
  loop_control:
    label: "{{ item.dhcp_name }}"

# -------------------------------------------------
# VALIDATE GATEWAY LOCATION
# Memastikan gateway berada di dalam network DHCP
# -------------------------------------------------

- name: Validate gateway inside DHCP network
  assert:
    that:
      - item.dhcp_gateway | ansible.utils.ipaddr(item.dhcp_network)
    fail_msg: >
      Gateway {{ item.dhcp_gateway }} NOT inside {{ item.dhcp_network }}
    success_msg: "Gateway inside network"
  loop: "{{ mikrotik_dhcp }}"
  loop_control:
    label: "{{ item.dhcp_name }}"

# -------------------------------------------------
# VALIDATE DHCP RANGE LOCATION
# Memastikan DHCP range masih berada di network
# -------------------------------------------------

- name: Validate DHCP range inside network
  assert:
    that:
      - item.dhcp_range.split('-')[0] | ansible.utils.ipaddr(item.dhcp_network)
      - item.dhcp_range.split('-')[1] | ansible.utils.ipaddr(item.dhcp_network)
    fail_msg: >
      DHCP range {{ item.dhcp_range }} NOT inside {{ item.dhcp_network }}
    success_msg: "DHCP range inside network"
  loop: "{{ mikrotik_dhcp }}"
  loop_control:
    label: "{{ item.dhcp_name }}"

# -------------------------------------------------
# VALIDATE DHCP RANGE ORDER
# Memastikan IP awal lebih kecil dari IP akhir
# -------------------------------------------------

- name: Validate DHCP range order (start < end)
  assert:
    that:
      - >
        (item.dhcp_range.split('-')[0] | ansible.utils.ipaddr('int')) <
        (item.dhcp_range.split('-')[1] | ansible.utils.ipaddr('int'))
    fail_msg: >
      DHCP range {{ item.dhcp_range }} INVALID.
      Start IP must be lower than End IP
    success_msg: "DHCP range order valid"
  loop: "{{ mikrotik_dhcp }}"
  loop_control:
    label: "{{ item.dhcp_name }}"

# -------------------------------------------------
# VALIDATE DHCP LEASE IP
# Memastikan IP lease valid
# -------------------------------------------------

- name: Validate DHCP lease IP
  assert:
    that:
      - item.ip_address | ansible.utils.ipaddr
    fail_msg: "Invalid lease IP: {{ item.ip_address }}"
    success_msg: "Lease IP valid"

  loop: "{{ mikrotik_dhcp_lease }}"
  loop_control:
    label: "{{ item.comment }}"

# -------------------------------------------------
# VALIDATE LEASE INSIDE DHCP NETWORK
# Memastikan lease berada dalam subnet DHCP
# -------------------------------------------------

- name: Validate lease inside DHCP network
  assert:
    that:
      - >
        item.ip_address
        | ansible.utils.ipaddr(
            mikrotik_dhcp[0].dhcp_network
          )
    fail_msg: >
      Lease {{ item.ip_address }}
      NOT inside DHCP network {{ mikrotik_dhcp[0].dhcp_network }}
    success_msg: "Lease inside DHCP network"

  loop: "{{ mikrotik_dhcp_lease }}"
  loop_control:
    label: "{{ item.comment }}"

# -------------------------------------------------
# VALIDATE DHCP LEASE MAC
# Memastikan MAC address valid
# -------------------------------------------------

- name: Validate DHCP lease MAC
  assert:
    that:
      - item.mac_address is match(
          '^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$'
        )
    fail_msg: "Invalid MAC address: {{ item.mac_address }}"
    success_msg: "Lease MAC valid"

  loop: "{{ mikrotik_dhcp_lease }}"
  loop_control:
    label: "{{ item.comment }}"

# -------------------------------------------------
# VALIDATE DHCP LEASE COMMENT
# Memastikan comment tidak kosong
# -------------------------------------------------

- name: Validate DHCP lease comment
  assert:
    that:
      - item.comment | length > 0
    fail_msg: "Lease comment cannot be empty"
    success_msg: "Lease comment valid"

  loop: "{{ mikrotik_dhcp_lease }}"
  loop_control:
    label: "{{ item.comment }}"

# -------------------------------------------------
# VALIDATE GLOBAL DNS CONFIGURATION
# Memastikan daftar DNS server valid
# -------------------------------------------------

- name: Validate DNS servers list
  assert:
    that:
      - mikrotik_dns.servers is iterable
      - mikrotik_dns.servers | length > 0
    fail_msg: "DNS servers list is empty or invalid"
    success_msg: "DNS servers list valid"

# -------------------------------------------------
# VALIDATE EACH DNS SERVER
# Memastikan setiap DNS server adalah IP valid
# -------------------------------------------------

- name: Validate each DNS server IP
  assert:
    that:
      - item | ansible.utils.ipaddr
    fail_msg: "Invalid DNS server: {{ item }}"
    success_msg: "DNS server valid: {{ item }}"
  loop: "{{ mikrotik_dns.servers }}"
  loop_control:
    label: "{{ item }}"

# -------------------------------------------------
# VALIDATE DNS REMOTE REQUEST OPTION
# Memastikan nilai boolean true/false
# -------------------------------------------------

- name: Validate allow_remote_requests is boolean
  assert:
    that:
      - mikrotik_dns.allow_remote_requests is boolean
    fail_msg: "allow_remote_requests must be true/false"
    success_msg: "allow_remote_requests valid"

# -------------------------------------------------
# VALIDATE SRCNAT STRUCTURE
# Memastikan parameter wajib SRCNAT tersedia
# -------------------------------------------------

- name: Validate srcnat structure
  assert:
    that:
      - item.out_interface is defined
      - item.action is defined
    fail_msg: "Invalid SRCNAT rule: {{ item }}"
    success_msg: "SRCNAT structure valid"

  loop: >-
    {{
      mikrotik_nat
      | selectattr('chain', 'equalto', 'srcnat')
      | list
    }}

  loop_control:
    label: "{{ item.out_interface }}"

# -------------------------------------------------
# VALIDATE SRCNAT INTERFACE
# Memastikan interface SRCNAT terdapat pada inventory
# -------------------------------------------------

- name: Validate srcnat interface exists
  assert:
    that:
      - item.out_interface in (
          mikrotik_interfaces
          | map(attribute='interface')
          | list
        )
    fail_msg: >
      Interface {{ item.out_interface }} not found
    success_msg: "SRCNAT interface valid"

  loop: >-
    {{
      mikrotik_nat
      | selectattr('chain', 'equalto', 'srcnat')
      | list
    }}

  loop_control:
    label: "{{ item.out_interface }}"

# -------------------------------------------------
# VALIDATE DSTNAT STRUCTURE
# Memastikan parameter wajib DSTNAT tersedia
# -------------------------------------------------

- name: Validate dstnat structure
  assert:
    that:
      - item.protocol is defined
      - item.dst_port is defined
      - item.to_address is defined
      - item.to_port is defined
      - item.action is defined
    fail_msg: "Invalid DSTNAT rule: {{ item }}"
    success_msg: "DSTNAT structure valid"

  loop: >-
    {{
      mikrotik_nat
      | selectattr('chain', 'equalto', 'dstnat')
      | list
    }}

  loop_control:
    label: "{{ item.dst_port }}"

# -------------------------------------------------
# VALIDATE DSTNAT PROTOCOL
# Memastikan protocol menggunakan TCP atau UDP
# -------------------------------------------------

- name: Validate dstnat protocol
  assert:
    that:
      - item.protocol in ['tcp', 'udp']
    fail_msg: >
      Invalid protocol {{ item.protocol }}
    success_msg: "DSTNAT protocol valid"

  loop: >-
    {{
      mikrotik_nat
      | selectattr('chain', 'equalto', 'dstnat')
      | list
    }}

  loop_control:
    label: "{{ item.dst_port }}"

# -------------------------------------------------
# VALIDATE DSTNAT TARGET IP
# Memastikan alamat tujuan NAT menggunakan IP valid
# -------------------------------------------------

- name: Validate dstnat target IP
  assert:
    that:
      - item.to_address | ansible.utils.ipaddr
    fail_msg: >
      Invalid destination IP {{ item.to_address }}
    success_msg: "DSTNAT target IP valid"

  loop: >-
    {{
      mikrotik_nat
      | selectattr('chain', 'equalto', 'dstnat')
      | list
    }}

  loop_control:
    label: "{{ item.dst_port }}"

# -------------------------------------------------
# VALIDATE DSTNAT PORT
# Memastikan dst_port dan to_port berada pada rentang 1-65535
# -------------------------------------------------

- name: Validate dstnat port
  assert:
    that:
      - item.dst_port | int > 0
      - item.dst_port | int < 65536
      - item.to_port | int > 0
      - item.to_port | int < 65536
    fail_msg: >
      Invalid NAT port configuration
    success_msg: "DSTNAT ports valid"

  loop: >-
    {{
      mikrotik_nat
      | selectattr('chain', 'equalto', 'dstnat')
      | list
    }}

  loop_control:
    label: "{{ item.dst_port }}"

# -------------------------------------------------
# FINAL VALIDATION RESULT
# -------------------------------------------------

- name: Validation success
  debug:
    msg: "ALL CONFIGURATION VALID AND SAFE TO DEPLOY"
