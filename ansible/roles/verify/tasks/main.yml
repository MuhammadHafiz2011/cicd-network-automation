---


# ==================================================
# COLLECT CURRENT DEVICE STATE
# ==================================================

# --------------------------------------------------
# GET CURRENT IP ADDRESS CONFIGURATION
# --------------------------------------------------

- name: Get current IP configuration
  community.routeros.command:
    commands:
      - /ip address print detail without-paging
  register: current_ip
  changed_when: false

# --------------------------------------------------
# GET CURRENT DHCP SERVER CONFIGURATION
# --------------------------------------------------

- name: Get current DHCP server configuration
  community.routeros.command:
    commands:
      - /ip dhcp-server print detail without-paging
  register: current_dhcp
  changed_when: false

# --------------------------------------------------
# GET CURRENT DHCP NETWORK CONFIGURATION
# --------------------------------------------------

- name: Get current DHCP network configuration
  community.routeros.command:
    commands:
      - /ip dhcp-server network print detail without-paging
  register: current_network
  changed_when: false

# --------------------------------------------------
# GET CURRENT DHCP POOL CONFIGURATION
# --------------------------------------------------

- name: Get current DHCP pool configuration
  community.routeros.command:
    commands:
      - /ip pool print detail without-paging
  register: current_pool
  changed_when: false

# --------------------------------------------------
# GET CURRENT DNS CONFIGURATION
# --------------------------------------------------

- name: Get current DNS configuration
  community.routeros.command:
    commands:
      - /ip dns print detail without-paging
  register: current_dns
  changed_when: false

# --------------------------------------------------
# GET CURRENT NAT CONFIGURATION
# --------------------------------------------------

- name: Get current NAT configuration
  community.routeros.command:
    commands:
      - /ip firewall nat print detail without-paging
  register: current_nat
  changed_when: false

# =====================================
# VERIFY DEPLOYED CONFIGURATION
# =====================================

# -------------------------------------
# VERIFY INTERFACE IP ADDRESS
# -------------------------------------

- name: Verify interface IP configuration
  assert:
    that:
      - >
        current_ip.stdout[0]
        is search(
          'address=' ~ item.ip_address
        )

      - >
        current_ip.stdout[0]
        is search(
          'interface=' ~ item.interface ~ '(\\s|$)'
        )

    fail_msg: >
      [VERIFY FAILURE]
      IP {{ item.ip_address }}
      not found on interface {{ item.interface }}.
      Configuration drift detected after deployment.

    success_msg: >
      [VERIFY SUCCESS]
      IP {{ item.ip_address }}
      verified on interface {{ item.interface }}.

  loop: "{{ mikrotik_interfaces }}"
  loop_control:
    label: "{{ item.interface }}"

  when: item.ip_address is defined

# -------------------------------------
# VERIFY DHCP SERVER
# -------------------------------------

- name: Verify DHCP server configuration
  assert:
    that:
      - >
        current_dhcp.stdout[0]
        is search(
          'name="' ~ item.dhcp_name ~ '"'
        )

      - >
        current_dhcp.stdout[0]
        is search(
          'interface=' ~ item.interface
        )

      - >
        current_dhcp.stdout[0]
        is search(
          'address-pool=' ~ item.dhcp_pool
        )

    fail_msg: >
      [VERIFY FAILURE]
      DHCP server {{ item.dhcp_name }}
      not found or mismatched.

    success_msg: >
      [VERIFY SUCCESS]
      DHCP server {{ item.dhcp_name }}
      verified.

  loop: "{{ mikrotik_dhcp }}"
  loop_control:
    label: "{{ item.dhcp_name }}"

# -------------------------------------
# VERIFY DHCP NETWORK
# -------------------------------------

- name: Verify DHCP network configuration
  assert:
    that:
      - >
        current_network.stdout[0]
        is search(
          'address=' ~ item.dhcp_network
        )

      - >
        current_network.stdout[0]
        is search(
          'gateway=' ~ item.dhcp_gateway
        )

      - >
        current_network.stdout[0]
        is search(
          'dns-server=' ~ item.dns_server
        )

    fail_msg: >
      [VERIFY FAILURE]
      DHCP Network {{ item.dhcp_network }}
      mismatch detected.

    success_msg: >
      [VERIFY SUCCESS]
      DHCP Network {{ item.dhcp_network }}
      verified.

  loop: "{{ mikrotik_dhcp }}"
  loop_control:
    label: "{{ item.dhcp_network }}"

# -------------------------------------
# VERIFY DHCP POOL
# -------------------------------------

- name: Verify DHCP pool configuration
  assert:
    that:
      - >
        current_pool.stdout[0]
        is search(
          'name="' ~ item.dhcp_pool ~ '"'
        )

      - >
        current_pool.stdout[0]
        is search(
          'ranges=' ~ item.dhcp_range
        )

    fail_msg: >
      [VERIFY FAILURE]
      DHCP pool {{ item.dhcp_pool }}
      mismatch detected.

    success_msg: >
      [VERIFY SUCCESS]
      DHCP pool {{ item.dhcp_pool }}
      verified.

  loop: "{{ mikrotik_dhcp }}"
  loop_control:
    label: "{{ item.dhcp_pool }}"

# -------------------------------------
# VERIFY DNS CONFIGURATION
# -------------------------------------

- name: Verify DNS configuration exists
  assert:
    that:
      - current_dns.stdout is defined
      - current_dns.stdout[0] | length > 0

    fail_msg: >
      [VERIFY FAILURE]
      DNS configuration not found on device.

    success_msg: >
      [VERIFY SUCCESS]
      DNS configuration detected successfully.

# -------------------------------------
# VERIFY NAT RULES
# -------------------------------------

- name: Verify NAT rules
  assert:
    that:
      - >
        current_nat.stdout[0]
        is search(
          'chain=' ~ item.chain
        )

      - >
        current_nat.stdout[0]
        is search(
          'out-interface=' ~ item.out_interface
        )

      - >
        current_nat.stdout[0]
        is search(
          'action=' ~ item.action
        )

    fail_msg: >
      [VERIFY FAILURE]
      NAT rule {{ item.chain }} | {{ item.out_interface }}
      not found or mismatched.

    success_msg: >
      [VERIFY SUCCESS]
      NAT rule {{ item.chain }} | {{ item.out_interface }}
      verified.

  loop: "{{ mikrotik_nat }}"
  loop_control:
    label: "{{ item.chain }} | {{ item.out_interface }}"

# -------------------------------------
# VERIFICATION COMPLETED
# -------------------------------------

- name: Verification completed
  debug:
    msg: "ALL CONFIGURATION AND SERVICES VERIFIED SUCCESSFULLY"
