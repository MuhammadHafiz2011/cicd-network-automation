---

# ============================================================
# COLLECT CURRENT STATE
# ============================================================

- name: Get current IP configuration
  community.routeros.command:
    commands:
      - /ip address print detail without-paging
  register: ip
  changed_when: false

- name: Get DHCP server configuration
  community.routeros.command:
    commands:
      - /ip dhcp-server print detail without-paging
  register: dhcp
  changed_when: false

- name: Get DHCP network configuration
  community.routeros.command:
    commands:
      - /ip dhcp-server network print detail without-paging
  register: network
  changed_when: false

- name: Get DHCP pool configuration
  community.routeros.command:
    commands:
      - /ip pool print detail without-paging
  register: pool
  changed_when: false


# ============================================================
# VERIFY IP ADDRESS
# ============================================================

- name: Verify IP address exact
  assert:
    that:
      - ip.stdout_lines | select('search', item.ip_address) | list | length > 0
      - ip.stdout_lines | select('search', item.interface) | list | length > 0
    fail_msg: >
      [VERIFY STAGE FAILURE]
      Expected IP {{ item.ip_address }} on interface {{ item.interface }} not found.
      Device configuration does not match declared pipeline configuration.
      Triggering rollback mechanism.
    success_msg: >
      [VERIFY SUCCESS]
      IP {{ item.ip_address }} verified on interface {{ item.interface }}.
  loop: "{{ mikrotik_interfaces }}"


# ============================================================
# VERIFY DHCP SERVER
# ============================================================

- name: Verify DHCP server exact
  assert:
    that:
      - dhcp.stdout_lines | select('search', item.dhcp_name) | list | length > 0
      - dhcp.stdout_lines | select('search', item.interface) | list | length > 0
    fail_msg: >
      [VERIFY STAGE FAILURE]
      DHCP Server {{ item.dhcp_name }} missing or misconfigured.
      Deployment result inconsistent with expected state.
      Triggering rollback mechanism.
    success_msg: >
      [VERIFY SUCCESS]
      DHCP Server {{ item.dhcp_name }} verified.
  loop: "{{ mikrotik_dhcp }}"


# ============================================================
# VERIFY DHCP NETWORK
# ============================================================

- name: Verify DHCP network exact
  assert:
    that:
      - network.stdout_lines | select('search', item.dhcp_network) | list | length > 0
      - network.stdout_lines | select('search', item.dhcp_gateway) | list | length > 0
    fail_msg: >
      [VERIFY STAGE FAILURE]
      DHCP Network {{ item.dhcp_network }} not found or incorrect.
      Network definition mismatch detected.
      Triggering rollback mechanism.
    success_msg: >
      [VERIFY SUCCESS]
      DHCP Network {{ item.dhcp_network }} verified.
  loop: "{{ mikrotik_dhcp }}"


# ============================================================
# VERIFY DHCP POOL
# ============================================================

- name: Verify DHCP pool exact
  assert:
    that:
      - pool.stdout_lines | select('search', item.dhcp_pool) | list | length > 0
      - pool.stdout_lines | select('search', item.dhcp_range) | list | length > 0
    fail_msg: >
      [VERIFY STAGE FAILURE]
      DHCP Pool {{ item.dhcp_pool }} not detected or range mismatch.
      Triggering rollback mechanism.
    success_msg: >
      [VERIFY SUCCESS]
      DHCP Pool {{ item.dhcp_pool }} verified.
  loop: "{{ mikrotik_dhcp }}"


# ============================================================
# SERVICE CONTINUITY VERIFICATION
# ============================================================

- name: Verify connectivity to Cloud
  community.routeros.command:
    commands:
      - /ping {{ cloud_ip }} count=3
  register: ping_result
  changed_when: false

- name: Fail if ping to Cloud failed
  assert:
    that:
      - "'packet-loss=100%' not in ping_result.stdout"
    fail_msg: >
      [SERVICE CONTINUITY FAILURE]
      Cloud {{ cloud_ip }} unreachable from MikroTik gateway.
      Edge-to-cloud communication disrupted.
      Triggering automatic rollback.
    success_msg: >
      [VERIFY SUCCESS]
      Cloud {{ cloud_ip }} reachable from MikroTik gateway.


# ============================================================
# FINAL SUCCESS
# ============================================================

- name: Verification completed
  debug:
    msg: "ALL CONFIGURATION AND SERVICE VERIFIED SUCCESSFULLY"

