---

# ============================================
# DHCP SERVER CONFIGURATION (FINAL - STABLE)
# ============================================

# ----------------------------------------
# GET CURRENT DHCP SERVER
# ----------------------------------------

- name: Get current DHCP servers
  community.routeros.command:
    commands:
      - /ip dhcp-server print detail without-paging
  register: current_dhcp
  changed_when: false

# ----------------------------------------
# BUILD EXISTING SERVER LIST (CLEAN)
# ----------------------------------------

- name: Build existing server list
  set_fact:
    existing_servers: >-
      {{
        current_dhcp.stdout[0]
        | regex_findall('name="([^"]+)"')
        | list
      }}

- debug:
    msg: "{{ existing_servers }}"

# ----------------------------------------
# REMOVE ORPHAN (FINAL CLEANUP)
# ----------------------------------------

- name: Remove orphan DHCP servers
  community.routeros.command:
    commands:
      - /ip dhcp-server remove [find name="{{ item }}"]
  loop: "{{ existing_servers }}"
  when: item not in (mikrotik_dhcp | map(attribute='dhcp_name') | list)

# ----------------------------------------
# ADD / UPDATE (IMPERATIVE - CORE)
# ----------------------------------------

- name: Add or Update DHCP server
  community.routeros.command:
    commands:
      - >
        :local sName "{{ item.dhcp_name }}";
        :local sIf "{{ item.interface }}";
        :local sPool "{{ item.dhcp_pool }}";
        :local existing [:len [/ip dhcp-server find name=$sName]];

        :if ($existing = 0) do={
          /ip dhcp-server add name=$sName interface=$sIf address-pool=$sPool disabled=no;
        } else={
          :if (
            [/ip dhcp-server get [find name=$sName] interface] != $sIf
            or
            [/ip dhcp-server get [find name=$sName] address-pool] != $sPool
          ) do={
            /ip dhcp-server remove [find name=$sName];
            /ip dhcp-server add name=$sName interface=$sIf address-pool=$sPool disabled=no;
          }
        }
  loop: "{{ mikrotik_dhcp }}"
  loop_control:
    label: "Syncing Server: {{ item.dhcp_name }}"
