---

# ============================================
# DHCP SERVER CONFIGURATION (FINAL - STABLE)
# ============================================

# ----------------------------------------
# GET CURRENT DHCP SERVER
# ----------------------------------------

- name: Get current DHCP servers
  community.routeros.command:
    commands:
      - /ip dhcp-server print detail without-paging
  register: current_dhcp
  changed_when: false

# ----------------------------------------
# BUILD EXISTING SERVER LIST (CLEAN)
# ----------------------------------------

- name: Build existing server list
  set_fact:
    existing_servers: >-
      {{
        current_dhcp.stdout[0]
        | regex_findall('name="?([^\\s"]+)"?')
        | map('trim')
        | list
      }}

# ----------------------------------------
# REMOVE ORPHAN (FINAL CLEANUP)
# ----------------------------------------

- name: Remove orphan DHCP servers
  community.routeros.command:
    commands:
      - /ip dhcp-server remove [find name="{{ item }}"]
  loop: "{{ existing_servers }}"
  when: item not in (mikrotik_dhcp | map(attribute='dhcp_name') | list)

# ----------------------------------------
# ADD / UPDATE (IMPERATIVE - CORE)
# ----------------------------------------

- name: Recreate DHCP server
  community.routeros.command:
    commands:
      - >
        /ip dhcp-server remove [find];

        /ip dhcp-server add \
        name="{{ item.dhcp_name }}" \
        interface="{{ item.interface }}" \
        address-pool="{{ item.dhcp_pool }}" \
        disabled=no;
  loop: "{{ mikrotik_dhcp }}"
  loop_control:
    label: "Syncing Server: {{ item.dhcp_name }}"
