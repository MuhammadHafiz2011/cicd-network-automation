---

# ============================================
# IP ADDRESS CONFIGURATION
# ============================================

# -----------------------------------
# GET CURRENT IP CONFIGURATION
# -----------------------------------

- name: Get current IP configuration
  community.routeros.command:
    commands:
      - /ip address print terse without-paging
  register: current_ip
  changed_when: false

# -----------------------------------
# REMOVE WRONG IP ON INTERFACE
# -----------------------------------

- name: Remove wrong IP on interface
  community.routeros.command:
    commands:
      - /ip address remove [find interface="{{ item.interface }}"]
  when:
    - item.ip_address is defined
    - current_ip.stdout_lines
      | select('search', 'interface=' ~ item.interface ~ '(\\s|$)')
      | select('search', item.ip_address)
      | list
      | length == 0
  loop: "{{ mikrotik_interfaces }}"
  loop_control:
    label: "{{ item.interface }}"

# -----------------------------------
# ADD CORRECT IP
# -----------------------------------

- name: Add correct IP
  community.routeros.command:
    commands:
      - /ip address add address="{{ item.ip_address }}" interface="{{ item.interface }}"
  when:
    - item.ip_address is defined
    - current_ip.stdout_lines
      | select('search', 'interface=' ~ item.interface ~ '(\\s|$)')
      | select('search', item.ip_address)
      | list
      | length == 0
  loop: "{{ mikrotik_interfaces }}"
  loop_control:
    label: "{{ item.interface }}"
